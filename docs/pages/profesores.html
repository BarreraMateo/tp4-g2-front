<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profesores</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="navbar">
    <a href="../index.html">Ir a INICIO</a>
    <a href="notas.html">Ir a NOTAS</a>
    <a href="profesores.html">Ir a PROFESORES</a>
    <a href="materias.html">Ir a MATERIAS</a>
    </div>
    <br><br>

    <button id="btn-profesores">Cargar Todos los Profesores</button>
    <div id="card-container-todos"></div>

    <br>

    <input type="text" id="input-legajo" placeholder="Ingrese legajo del profesor">
    <button id="btn-profesor-legajo">Buscar Profesor</button>
    <div id="card-container-legajo"></div>

    <br>

    <input type="text" id="input-nombre" placeholder="Nombre">
    <input type="text" id="input-apellido" placeholder="Apellido">
    <input type="text" id="input-email" placeholder="Email">
    <input type="text" id="input-especialidad" placeholder="Especialidad">

    <button id="btn-profesor-nuevo">
        Crear Profesor
    </button>

    <div id="card-container-nuevo"></div>

    <br>

    <input type="text" id="input-legajoM" placeholder="Legajo">
    <input type="text" id="input-nombreM" placeholder="Nombre">
    <input type="text" id="input-apellidoM" placeholder="Apellido">
    <input type="text" id="input-emailM" placeholder="Email">
    <input type="text" id="input-especialidadM" placeholder="Especialidad">
    <input type="text" id="input-isActiveM" placeholder="isActive">

    <button id="btn-profesor-modificar">
        Modificar Profesor
    </button>

    <div id="card-container-modificar"></div>

    <br>

    <input type="text" id="input-legajoE" placeholder="Legajo">
    <button id="btn-profesor-eliminar">
        Eliminar Profesor
    </button>

    <div id="card-container-eliminar"></div>

    <script src="../js/profesores.js"></script>

</body>
</html>
