<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Materias</title>
</head>
<body>

    <a href="../index.html">Ir a INICIO</a>
    <a href="notas.html">Ir a NOTAS</a>
    <a href="profesores.html">Ir a PROFESORES</a>
    <a href="materias.html">Ir a MATERIAS</a>

    <br><br>

    <button id="btn-materias">Cargar Todas las Materias</button>
    <div id="card-container-todos"></div>

    <br>

    <input
      type="text"
      id="input-idMateria"
      placeholder="Ingrese ID de Materia"
    >

    <button id="btn-materia-id">
      Buscar Materia
    </button>

    <div id="card-container-id"></div>

    <br>

    <input
      type="text"
      id="input-idMateriaNuevo"
      placeholder="ID Materia"
    >

    <input
      type="text"
      id="input-nombre"
      placeholder="Nombre"
    >

    <input
      type="number"
      id="input-cuatrimestre"
      placeholder="Cuatrimestre"
    >

    <button id="btn-materia-nueva">
      Crear Materia
    </button>

    <div id="card-container-nuevo"></div>

    <br>

    <input
      type="text"
      id="input-idMateriaM"
      placeholder="ID Materia"
    >

    <input
      type="text"
      id="input-nombreM"
      placeholder="Nombre"
    >

    <input
      type="number"
      id="input-cuatrimestreM"
      placeholder="Cuatrimestre"
    >

    <button id="btn-materia-modificar">
      Modificar Materia
    </button>

    <div id="card-container-modificar"></div>

    <br>

    <input
      type="text"
      id="input-idMateriaE"
      placeholder="ID Materia"
    >

    <button id="btn-materia-eliminar">
      Eliminar Materia
    </button>

    <div id="card-container-eliminar"></div>

    <script src="../js/materias.js"></script>

</body>
</html>
