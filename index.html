<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/assets/favicon.ico" type="image/x-icon">
    <title>Front TP4-G2</title>
</head>
<body>
    <button id="btn-alumnos" >Cargar Todos los Alumnos</button>
    <div id="card-container-todos"></div>
    <br>
    <input type="text" id="input-legajo" placeholder="Ingrese legajo del alumno">
    <button id="btn-alumno-legajo">Cargar Alumno por Legajo</button>
    <div id="card-container-legajo"></div>
    <br>
    <input type="text" id="input-nombre" placeholder="Ingrese nombre del alumno">
    <input type="text" id="input-apellido" placeholder="Ingrese apellido del alumno">
    <input type="text" id="input-email" placeholder="Ingrese email del alumno">
    <button id="btn-alumno-nuevo">Crear Alumno Nuevo</button>
    <div id="card-container-nuevo"></div>
    <br>
    <input type="text" id="input-legajoM" placeholder="Ingrese legajo del alumno">
    <input type="text" id="input-nombreM" placeholder="Ingrese nombre del alumno">
    <input type="text" id="input-apellidoM" placeholder="Ingrese apellido del alumno">
    <input type="text" id="input-emailM" placeholder="Ingrese email del alumno">
    <input type="text" id="input-isActiveM" placeholder="Ingrese isActive del alumno">
    <button id="btn-alumno-modificar">Modificar Alumno por Legajo</button>
    <div id="card-container-modificar"></div>
    <br>
    <input type="text" id="input-legajoE" placeholder="Ingrese legajo del alumno">
    <button id="btn-alumno-eliminar">Eliminar Alumno por Legajo</button>
    <div id="card-container-eliminar"></div>


    <script src="/js/alumnos.js"></script>
</body>
</html>
